version: "3"

services:
  app:
    build: .
    container_name: node_app
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - mongo
    restart: always

  mongo:
    image: mongo
    container_name: mongodb
    restart: always
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: